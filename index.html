<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WQB Manager — Alpha Management</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h1>🧠 <span>WQB</span> Manager</h1>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px">Alpha Management System</p>
    <form id="login-form" onsubmit="return doLogin(event)">
      <input id="login-user" type="text" placeholder="Username" autocomplete="username" />
      <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" />
      <div id="login-error" style="color:#f85149;font-size:12px;margin-bottom:8px;display:none"></div>
      <button type="submit" class="btn btn-primary" style="width:100%">🔑 登录</button>
    </form>
  </div>
</div>

<div id="app-container" style="display:none">

<header>
  <h1>🧠 <span>WQB</span> Manager</h1>
  <div class="status-badge">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Loading...</span>
    <button class="btn btn-sm" onclick="showSettings()" style="margin-left:12px">⚙️</button>
  </div>
</header>

<nav class="tabs">
  <button data-tab="dashboard" onclick="switchTab('dashboard')" class="active">📊 Dashboard</button>
  <button data-tab="templates" onclick="switchTab('templates')">📋 Templates</button>
  <button data-tab="alphas" onclick="switchTab('alphas')">📈 Alphas</button>
  <button data-tab="generate" onclick="switchTab('generate')">🔧 Generate</button>
  <button data-tab="data" onclick="switchTab('data')">🔍 Data</button>
</nav>

<main>
  <div id="tab-dashboard" class="tab-content active">
    <div id="dashboard-content"></div>
  </div>
  
  <div id="tab-templates" class="tab-content">
    <div id="templates-content"></div>
  </div>
  
  <div id="tab-alphas" class="tab-content">
    <div id="alphas-content"></div>
  </div>
  
  <div id="tab-generate" class="tab-content">
    <div id="generate-content"></div>
  </div>
  
  <div id="tab-data" class="tab-content">
    <div id="data-content"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-content"></div>
  </div>
</div>

<script src="app.js"></script>
</div>
</body>
</html>
